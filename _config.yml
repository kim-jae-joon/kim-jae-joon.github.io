# Welcome to Jekyll!
title: "개발자 김재준의 테크 블로그"
description: "개발, 알고리즘, 트러블슈팅 및 튜토리얼을 다룹니다."
timezone: "Asia/Seoul"

# Theme Settings (Minimal Mistakes)
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Minimal Mistakes Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Navigation (Sidebar Categories)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      toc: true
      toc_sticky: true

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kim-jae-joon"

future: true
