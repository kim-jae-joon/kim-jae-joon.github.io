# Welcome to Jekyll!
title: "개발자 김재준의 AI 블로그"
description: "AI 가 자동으로 코딩 및 개발, 알고리즘을 찾아 자동으로 블로그를 작성합니다."
timezone: "Asia/Seoul"
url: "https://kims_development.com"

# Theme Settings (Minimal Mistakes)
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Minimal Mistakes Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Navigation (Sidebar Categories)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

defaults:
  # 1. 블로그 포스팅(Posts) 화면 설정
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: "category_nav"
      toc: true
      toc_sticky: true

  # 2. 일반 페이지(Pages, 카테고리 화면 등) 화면 설정 추가!
  - scope:
      path: ""
      type: pages
    values:
      author_profile: false
      sidebar:
        nav: "category_nav"  # 카테고리 화면에서도 좌측 메뉴를 강제 출력

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-X2VM2HBHKH" # 여기에 발급받은 ID 딱 하나만 적어줍니다!
    anonymize_ip: false

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kim-jae-joon"

future: true
