# Welcome to Jekyll!
title: "개발자 김재준의 AI 블로그"
description: "AI 가 자동으로 코딩 및 개발, 알고리즘을 찾아 자동으로 블로그를 작성합니다."
timezone: "Asia/Seoul"

# Theme Settings (Minimal Mistakes)
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Minimal Mistakes Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Navigation (Sidebar Categories)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false # 좌측 프로필 숨김 처리
      sidebar:
        nav: "category_nav" # 방금 생성한 카테고리 네비게이션 연결
      read_time: true
      comments: true
      share: true
      toc: true         # 우측 목차 (Table of Contents) 출력
      toc_sticky: true  # 스크롤 시 우측 목차 고정

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kim-jae-joon"

future: true
