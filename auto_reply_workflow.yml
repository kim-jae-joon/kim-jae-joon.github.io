name: Scheduled Auto Reply Bot

on:
  schedule:
    # 1시간마다 정각에 실행
    - cron: '0 * * * *'
  # 깃허브 웹 화면에서 수동 버튼 실행 허용
  workflow_dispatch:

jobs:
  run-reply-bot:
    runs-on: ubuntu-latest
    permissions:
      issues: write # 댓글 작성용 필수 권한

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 클라우드 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install PyGithub google-generativeai

    - name: 24시간 자동 댓글 스크립트 실행
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python github_action_reply.py
