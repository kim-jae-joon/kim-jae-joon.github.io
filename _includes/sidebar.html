{% if page.sidebar %}
  <div class="sidebar sticky">
    
    {% if page.author_profile or layout.author_profile %}
      {% include author-profile.html %}
    {% endif %}

    {% if page.sidebar.nav %}
      {% include nav_list nav=page.sidebar.nav %}
    {% endif %}

    <div class="sidebar__visitor-counter" style="margin-top: 30px; text-align: center; padding: 15px 5px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.02); border-radius: 10px;">
      <p style="font-size: 0.75em; color: #82b1ff; margin-bottom: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 5px rgba(130, 177, 255, 0.5);">
        Visitor Stats
      </p>
      <a href="https://hits.sh/kim-jae-joon.github.io/" target="_blank">
        <img alt="Hits" 
             src="https://hits.sh/kim-jae-joon.github.io.svg?style=plastic&label=Post%26Click&color=439b20" 
             style="width: 95px; height: auto; filter: drop-shadow(0 0 6px rgba(67, 155, 32, 0.5)); transition: all 0.3s ease;" />
      </a>
    </div>
    
  </div>
{% endif %}
