{% if page.sidebar %}
  <div class="sidebar sticky">
    
    {% if page.author_profile or layout.author_profile %}
      {% include author-profile.html %}
    {% endif %}

    {% if page.sidebar.nav %}
      {% include nav_list nav=page.sidebar.nav %}
    {% endif %}

    <div class="sidebar__visitor-counter" style="margin-top: 40px; text-align: center; padding: 15px 10px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.02); border-radius: 10px;">
      <p style="font-size: 0.75em; color: #82b1ff; margin-bottom: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">
        Visitor Stats
      </p>
      <a href="https://hits.seeyoufarm.com">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fkim-jae-joon.github.io&count_bg=%2300E5FF&title_bg=%23222222&icon=opsgenie.svg&icon_color=%2300E5FF&title=VIEWS&edge_flat=false" 
             alt="Hits" 
             style="filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6)); max-width: 100%;" />
      </a>
    </div>
    
  </div>
{% endif %}
