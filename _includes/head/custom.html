<style>
  /* 1. 전체 우주 다크 테마 및 배경 투명화 */

  .masthead, .masthead__inner-wrap, .greedy-nav, .top_logo_area,
  .sidebar, .page__right, .page__footer, .page__related,
  .pagination, .comments-area {
    background: transparent !important;
    background-color: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  body {
    background-color: #050508 !important;
    color: #d1d1d1 !important;
    font-size: 0.72rem !important; /* 기본 글씨 약 30% 축소 */
    line-height: 1.6 !important;
  }

  /* 2. 텍스트 색상 및 강조 (하얀색 계열) */
  p, div, span, li, a, h1, h2, h3, h4, h5, h6, 
  .site-title, .masthead__menu-item a, .sidebar a, 
  .page__content a, .archive__item-title, .archive__item-excerpt, .archive__subtitle {
    color: #e5e5e5 !important;
  }
  a:hover { color: #82b1ff !important; }

  /* 3. 본문 영역 디자인 (반투명 블랙) */
  .page__inner-wrap {
    background-color: rgba(0, 0, 0, 0.7) !important;
    border-radius: 12px;
    padding: 25px !important;
    margin-bottom: 20px !important;
  }
  .page__title { font-size: 1.6em !important; }
  .page__content h1 { font-size: 1.4em !important; }
  .page__content h2 { font-size: 1.25em !important; }
  .page__content h3 { font-size: 1.1em !important; }

  /* 4. 우측 목차(TOC) & 인라인 코드 스타일 */
  .toc {
    background-color: rgba(0, 0, 0, 0.5) !important;
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    border-radius: 8px;
  }
  .toc .active {
    background-color: rgba(130, 177, 255, 0.2) !important;
    color: #82b1ff !important;
    border-left: 3px solid #82b1ff !important;
  }
  code, .highlighter-rouge {
    background-color: rgba(255, 255, 255, 0.1) !important;
    color: #ffcc80 !important; /* 살구색 강조 */
    padding: 2px 5px !important;
    border-radius: 4px;
  }

  /* 5. 은하계 캔버스 레이아웃 */
  #galaxy-canvas {
    position: fixed !important;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -999; pointer-events: none;
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  if (!document.getElementById('galaxy-canvas')) {
    const canvas = document.createElement('canvas');
    canvas.id = 'galaxy-canvas';
    document.body.prepend(canvas);
    const ctx = canvas.getContext('2d');
    let stars = [], mouseX = 0, mouseY = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < 350; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.3,
        opacity: Math.random() * 0.5 + 0.2,
        parallaxK: Math.random() * 0.04
      });
    }

    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - window.innerWidth / 2);
      mouseY = (e.clientY - window.innerHeight / 2);
    });

    function draw() {
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        let tx = star.x - (mouseX * star.parallaxK);
        let ty = star.y - (mouseY * star.parallaxK);
        if (tx < 0) tx += canvas.width; if (tx > canvas.width) tx -= canvas.width;
        if (ty < 0) ty += canvas.height; if (ty > canvas.height) ty -= canvas.height;
        ctx.arc(tx, ty, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
});
</script>
