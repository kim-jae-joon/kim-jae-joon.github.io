<script>
document.addEventListener("DOMContentLoaded", function() {
  // 블로그 본문에 배경 캔버스 강제 삽입
  if (!document.getElementById('galaxy-canvas')) {
    const canvas = document.createElement('canvas');
    canvas.id = 'galaxy-canvas';
    document.body.prepend(canvas);

    const ctx = canvas.getContext('2d');
    let stars = [];
    let mouseX = 0, mouseY = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 별 생성 (약 350개, 은은하고 작은 크기들)
    for (let i = 0; i < 350; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.2 + 0.3,
        opacity: Math.random() * 0.5 + 0.2,
        parallaxK: Math.random() * 0.04
      });
    }

    // 마우스 움직임 감지 (부드러운 움직임 효과)
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - window.innerWidth / 2);
      mouseY = (e.clientY - window.innerHeight / 2);
    });

    function draw() {
      // 캔버스에 직접 깊은 우주 배경색 칠하기
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      stars.forEach(star => {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        
        let tx = star.x - (mouseX * star.parallaxK);
        let ty = star.y - (mouseY * star.parallaxK);
        
        // 화면 밖 무한 루프
        if (tx < 0) tx += canvas.width;
        if (tx > canvas.width) tx -= canvas.width;
        if (ty < 0) ty += canvas.height;
        if (ty > canvas.height) ty -= canvas.height;

        ctx.arc(tx, ty, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
});
</script>
