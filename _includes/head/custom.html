<script>
document.addEventListener("DOMContentLoaded", function() {
  // 상단 공백 방지를 위해 캔버스를 body 맨 앞에 동적 생성
  if (!document.getElementById('galaxy-canvas')) {
    const canvas = document.createElement('canvas');
    canvas.id = 'galaxy-canvas';
    document.body.prepend(canvas);

    const ctx = canvas.getContext('2d');
    let stars = [];
    let mouseX = 0, mouseY = 0;

    // 🌟 실제 별의 표면 온도에 따른 다채로운 색상 배열 (R, G, B 형식)
    const starColors = [
      '255, 255, 255', // 백색 (시리우스)
      '130, 177, 255', // 청백색 (가장 뜨거운 별)
      '179, 229, 252', // 옅은 푸른색
      '255, 245, 157', // 황백색 (우리 태양)
      '255, 204, 128', // 주황색
      '239, 154, 154'  // 적색 (차가운 별, 베텔게우스)
    ];

    // 화면 리사이즈 대응
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 은은한 별 생성 (약 350개)
    for (let i = 0; i < 350; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.3,
        opacity: Math.random() * 0.5 + 0.2,
        parallaxK: Math.random() * 0.04,
        // 🌟 배열에서 랜덤으로 별의 색상 하나를 선택해 부여
        color: starColors[Math.floor(Math.random() * starColors.length)]
      });
    }

    // 마우스 움직임 추적 (Parallax 효과)
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - window.innerWidth / 2);
      mouseY = (e.clientY - window.innerHeight / 2);
    });

    function draw() {
      // 캔버스 자체에 우주 배경색 칠하기
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      stars.forEach(star => {
        ctx.beginPath();
        
        // 🌟 할당된 색상과 투명도를 적용
        ctx.fillStyle = `rgba(${star.color}, ${star.opacity})`;
        
        // 🌟 별 주변에 은은한 빛 번짐(Glow) 효과 추가
        ctx.shadowBlur = star.size * 2;
        ctx.shadowColor = `rgba(${star.color}, ${star.opacity})`;
        
        let tx = star.x - (mouseX * star.parallaxK);
        let ty = star.y - (mouseY * star.parallaxK);
        
        // 화면 경계 루프 처리
        if (tx < 0) tx += canvas.width;
        if (tx > canvas.width) tx -= canvas.width;
        if (ty < 0) ty += canvas.height;
        if (ty > canvas.height) ty -= canvas.height;

        ctx.arc(tx, ty, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
});
</script>
