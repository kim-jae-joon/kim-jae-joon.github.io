<style>
  /* 1. 우주 배경을 위한 전체 레이아웃 설정 */
  html, body {
    background-color: #050505 !important;
    margin: 0;
    padding: 0;
  }

  /* 모든 텍스트 색상을 밝은 회색/흰색으로 강제 고정 (검은 화면 방지) */
  body, p, div, span, li, input, textarea {
    color: #e0e0e0 !important;
  }

  /* 제목 및 링크 색상 설정 */
  h1, h2, h3, h4, h5, h6, .site-title, .masthead__menu-item a, .sidebar a, .page__content a {
    color: #ffffff !important;
  }

  /* 기존 테마의 흰색 배경들을 투명화하여 배경 별들이 보이게 함 */
  .masthead, .page, .archive, .sidebar, .page__footer, .page__related, .page__inner-wrap, .entries-list {
    background-color: transparent !important;
    background: transparent !important;
    border: none !important;
  }

  /* 본문 영역 가독성을 위한 은은한 반투명 배경 */
  .page__inner-wrap {
    background-color: rgba(255, 255, 255, 0.05) !important;
    border-radius: 15px;
    padding: 30px !important;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  /* 2. 중앙 포스팅 영역 글씨 30% 축소 (요청 사항) */
  .page__inner-wrap, .entries-list {
    font-size: 0.75rem !important; /* 약 70~75% 크기 */
    line-height: 1.8 !important;
  }
  .page__title { font-size: 2rem !important; }
  .archive__subtitle { font-size: 1.5rem !important; }

  /* 3. 은하계 캔버스 고정 (화면 전체 덮기) */
  #galaxy-canvas {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    z-index: -9999 !important; /* 최하단 배치 */
    pointer-events: none !important; /* 클릭 방해 금지 */
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // 캔버스를 body의 맨 처음에 강제로 삽입하여 구조적 문제 해결
  const canvas = document.createElement('canvas');
  canvas.id = 'galaxy-canvas';
  document.body.prepend(canvas);

  const ctx = canvas.getContext('2d');
  let stars = [];
  let mouseX = 0, mouseY = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // 별 생성 로직 (너무 밝지 않게 조절)
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.2,
      opacity: Math.random() * 0.4,
      parallaxK: Math.random() * 0.03
    });
  }

  // 마우스 반응
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX - window.innerWidth / 2);
    mouseY = (e.clientY - window.innerHeight / 2);
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => {
      ctx.beginPath();
      ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
      
      let tx = star.x - (mouseX * star.parallaxK);
      let ty = star.y - (mouseY * star.parallaxK);
      
      if (tx < 0) tx += canvas.width;
      if (tx > canvas.width) tx -= canvas.width;
      if (ty < 0) ty += canvas.height;
      if (ty > canvas.height) ty -= canvas.height;

      ctx.arc(tx, ty, star.size, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
});
</script>
