<div class="top_logo_area" style="width: 100%; text-align: center; padding: 40px 0; background-color: #f9f9f9; border-bottom: 1px solid #ddd;">
  <a href="{{ '/' | relative_url }}" style="text-decoration: none;">
    <h1 style="margin: 0; color: #333; font-weight: bold;">나만의 블로그 로고 (이미지 추가 예정)</h1>
  </a>
</div>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <ul class="visible-links">
          {%- for link in site.data.navigation.main -%}
            <li class="masthead__menu-item">
              <a href="{{ link.url | relative_url }}"{% if link.description %} title="{{ link.description }}"{% endif %}>{{ link.title }}</a>
            </li>
          {%- endfor -%}
        </ul>
      </nav>
    </div>
  </div>
</div>
