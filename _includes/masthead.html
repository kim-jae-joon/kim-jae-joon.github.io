<div class="top_logo_area" style="width: 100%; text-align: center; padding: 24px 0; background-color: #f9f9f9; border-bottom: 1px solid #ddd;">
  <a href="{{ '/' | relative_url }}" style="display: inline-block; text-decoration: none;">
    <img src="{{ 'assets/image/블로그_배너_260429.png' | relative_url }}" alt="블로그 배너" style="display: block; width: 100%; max-width: 520px; height: auto; margin: 0 auto;" />
  </a>
</div>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <ul class="visible-links">
          {%- for link in site.data.navigation.main -%}
            <li class="masthead__menu-item">
              <a href="{{ link.url | relative_url }}"{% if link.description %} title="{{ link.description }}"{% endif %}>{{ link.title }}</a>
            </li>
          {%- endfor -%}
        </ul>
      </nav>
    </div>
  </div>
</div>
